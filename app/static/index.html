<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAR — Book Agentic RAG</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f7;
    color: #1d1d1f;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 32px 24px 16px;
    text-align: center;
  }

  header h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  header p {
    font-size: 13px;
    color: #86868b;
    margin-top: 4px;
  }

  main {
    flex: 1;
    max-width: 680px;
    width: 100%;
    margin: 0 auto;
    padding: 0 20px 120px;
    display: flex;
    flex-direction: column;
  }

  #chat {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding: 16px 0;
  }

  .msg {
    padding: 14px 18px;
    border-radius: 14px;
    font-size: 15px;
    line-height: 1.55;
    max-width: 88%;
    animation: fadein 0.25s ease;
  }

  .msg.user {
    background: #0071e3;
    color: #fff;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }

  .msg.bot {
    background: #fff;
    color: #1d1d1f;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }

  .msg.bot p { margin: 0 0 8px; }
  .msg.bot p:last-child { margin-bottom: 0; }
  .msg.bot code {
    background: #f0f0f2;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
  }
  .msg.bot pre {
    background: #f0f0f2;
    padding: 12px;
    border-radius: 8px;
    overflow-x: auto;
    font-size: 13px;
    margin: 8px 0;
  }
  .msg.bot pre code { background: none; padding: 0; }
  .msg.bot ul, .msg.bot ol { padding-left: 20px; }
  .msg.bot blockquote {
    border-left: 3px solid #d2d2d7;
    padding-left: 12px;
    color: #515154;
    margin: 8px 0;
  }

  .msg.bot.loading {
    background: #fff;
    color: #86868b;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }

  .dots { display: inline-flex; gap: 4px; align-items: center; }
  .dots span {
    width: 7px; height: 7px;
    background: #86868b;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dots span:nth-child(2) { animation-delay: .2s; }
  .dots span:nth-child(3) { animation-delay: .4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: .3; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  @keyframes fadein {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .input-area {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(transparent, #f5f5f7 20%);
    padding: 20px 20px 28px;
  }

  .input-wrap {
    max-width: 680px;
    margin: 0 auto;
    display: flex;
    gap: 8px;
    background: #fff;
    border-radius: 28px;
    padding: 4px;
    box-shadow: 0 2px 12px rgba(0,0,0,.08);
  }

  .input-wrap input {
    flex: 1;
    border: none;
    outline: none;
    padding: 12px 18px;
    font-size: 15px;
    background: transparent;
    color: #1d1d1f;
  }

  .input-wrap input::placeholder { color: #a1a1a6; }

  .input-wrap button {
    background: #0071e3;
    color: #fff;
    border: none;
    border-radius: 24px;
    padding: 8px 20px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background .2s;
    white-space: nowrap;
  }

  .input-wrap button:hover { background: #0077ed; }
  .input-wrap button:disabled {
    background: #c7c7cc;
    cursor: not-allowed;
  }

  @media (prefers-color-scheme: dark) {
    body { background: #1c1c1e; color: #f5f5f7; }
    header p { color: #8e8e93; }
    .msg.bot, .msg.bot.loading {
      background: #2c2c2e;
      color: #f5f5f7;
      box-shadow: none;
    }
    .msg.bot code, .msg.bot pre { background: #3a3a3c; }
    .msg.bot blockquote { border-left-color: #48484a; color: #a1a1a6; }
    .input-area { background: linear-gradient(transparent, #1c1c1e 20%); }
    .input-wrap { background: #2c2c2e; }
    .input-wrap input { color: #f5f5f7; }
    .input-wrap input::placeholder { color: #636366; }
  }
</style>
</head>
<body>

<header>
  <h1>BAR</h1>
  <p>Book Agentic RAG — ask questions about your books</p>
</header>

<main>
  <div id="chat">
    <div class="msg bot">
      <p>Ask me anything and I'll search the available books.</p>
    </div>
  </div>
</main>

<div class="input-area">
  <div class="input-wrap">
    <input type="text" id="input" placeholder="Type your question..." autofocus>
    <button id="send">Ask</button>
  </div>
</div>

<script>
const input = document.getElementById('input');
const send = document.getElementById('send');
const chat = document.getElementById('chat');

function addMessage(text, role) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (role === 'bot') {
    div.innerHTML = marked.parse(text);
  } else {
    div.textContent = text;
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showLoading() {
  const div = document.createElement('div');
  div.className = 'msg bot loading';
  div.id = 'loading';
  div.innerHTML = '<span style="font-size:13px">Thinking</span> <span class="dots"><span></span><span></span><span></span></span>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function hideLoading() {
  const el = document.getElementById('loading');
  if (el) el.remove();
}

async function ask(question) {
  addMessage(question, 'user');
  showLoading();

  try {
    const res = await fetch('http://localhost:8000/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, thread_id: 'web-' + Date.now() })
    });
    const data = await res.json();
    hideLoading();
    addMessage(data.answer || 'Error getting response.', 'bot');
  } catch (e) {
    hideLoading();
    addMessage('Connection error with the server.', 'bot');
  }
}

send.addEventListener('click', () => {
  const q = input.value.trim();
  if (!q) return;
  input.value = '';
  ask(q);
});

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') send.click();
});
</script>

</body>
</html>
